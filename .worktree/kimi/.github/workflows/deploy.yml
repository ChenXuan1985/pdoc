name: Deploy Documentation

on:
  # 主分支推送时部署到 Staging
  push:
    branches: [master, main]
    paths:
      - 'pdoc/**'
      - 'doc/**'
      - 'setup.py'
      - '.github/workflows/deploy.yml'

  # 标签发布时部署到 Production
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'

  # 手动触发部署
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      version:
        description: '版本标签 (仅用于 production)'
        required: false
        type: string

  # 定时清理旧版本
  schedule:
    - cron: '0 0 * * 0'  # 每周日清理

env:
  PYTHONUNBUFFERED: 1
  FORCE_COLOR: 1

jobs:
  # ============================================
  # 确定部署环境
  # ============================================
  determine-environment:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      version: ${{ steps.set-env.outputs.version }}
      should_deploy: ${{ steps.set-env.outputs.should_deploy }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set environment variables
        id: set-env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_type }}" == "tag" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" == "master" ] || [ "${{ github.ref_name }}" == "main" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "version=latest" >> $GITHUB_OUTPUT
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

  # ============================================
  # 构建文档
  # ============================================
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    needs: determine-environment
    if: needs.determine-environment.outputs.should_deploy == 'true'
    environment:
      name: ${{ needs.determine-environment.outputs.environment }}
    outputs:
      artifact_name: ${{ steps.build.outputs.artifact_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch tags
        run: git fetch --depth=1 origin +refs/tags/*:refs/tags/*

      - name: Setup Python
        uses: ./.github/actions/setup
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-deploy-${{ hashFiles('**/setup.py') }}

      - name: Install dependencies
        run: |
          pip install -U pip setuptools wheel
          pip install -e .

      - name: Build documentation
        id: build
        env:
          GITHUB_REF: ${{ github.ref }}
          DEPLOY_ENV: ${{ needs.determine-environment.outputs.environment }}
        run: |
          time doc/build.sh
          ARTIFACT_NAME="docs-${{ needs.determine-environment.outputs.environment }}-${{ github.run_id }}"
          echo "artifact_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

      - name: Create version metadata
        run: |
          cat > doc/build/version.json << EOF
          {
            "version": "${{ needs.determine-environment.outputs.version }}",
            "environment": "${{ needs.determine-environment.outputs.environment }}",
            "commit": "${{ github.sha }}",
            "build_time": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "build_number": "${{ github.run_id }}"
          }
          EOF

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.artifact_name }}
          path: doc/build/
          retention-days: 30

  # ============================================
  # 部署到 Staging (GitHub Pages - Staging分支)
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [determine-environment, build]
    if: needs.determine-environment.outputs.environment == 'staging'
    environment:
      name: staging
      url: https://pdoc3.github.io/pdoc/staging/
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: doc/build/

      - name: Deploy to GitHub Pages (Staging)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          .github/deploy-gh-pages.sh staging

  # ============================================
  # 部署到 Production (GitHub Pages - 主分支)
  # ============================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [determine-environment, build]
    if: needs.determine-environment.outputs.environment == 'production'
    environment:
      name: production
      url: https://pdoc3.github.io/pdoc/
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: doc/build/

      - name: Deploy to GitHub Pages (Production)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          .github/deploy-gh-pages.sh production

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            doc/build/**
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ============================================
  # 发布到 PyPI
  # ============================================
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [determine-environment, build]
    if: |
      needs.determine-environment.outputs.environment == 'production' &&
      github.ref_type == 'tag' &&
      !contains(github.ref_name, '-')
    environment:
      name: pypi
      url: https://pypi.org/p/pdoc3
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: ./.github/actions/setup
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          pip install -U pip setuptools wheel build twine

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

  # ============================================
  # 清理旧版本
  # ============================================
  cleanup:
    name: Cleanup Old Deployments
    runs-on: ubuntu-latest
    needs: [determine-environment, build]
    if: github.event.schedule || github.event.inputs.environment == 'cleanup'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cleanup old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            
            const oldArtifacts = artifacts.data.artifacts.filter(artifact => {
              const age = new Date() - new Date(artifact.created_at);
              return age > 30 * 24 * 60 * 60 * 1000; // 30天
            });
            
            for (const artifact of oldArtifacts) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id
              });
              console.log(`Deleted artifact: ${artifact.name}`);
            }

  # ============================================
  # 通知部署结果
  # ============================================
  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [determine-environment, deploy-staging, deploy-production]
    if: always() && needs.determine-environment.outputs.should_deploy == 'true'
    steps:
      - name: Notify success
        if: |
          (needs.deploy-staging.result == 'success' || needs.deploy-staging.result == 'skipped') &&
          (needs.deploy-production.result == 'success' || needs.deploy-production.result == 'skipped')
        run: |
          echo "::notice::Documentation deployed successfully to ${{ needs.determine-environment.outputs.environment }}!"
          echo "Version: ${{ needs.determine-environment.outputs.version }}"

      - name: Notify failure
        if: |
          needs.deploy-staging.result == 'failure' ||
          needs.deploy-production.result == 'failure'
        run: |
          echo "::error::Documentation deployment failed!"
          exit 1
