name: CI

on:
  push:
    branches: [master, main, develop]
    paths-ignore:
      - '**.md'
      - 'doc/**'
      - '.gitignore'
  pull_request:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'doc/**'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests and only run linting'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
  schedule:
    - cron: '12 2 6 * *'  # 每月6号凌晨2:12运行

env:
  PYTHONUNBUFFERED: 1
  FORCE_COLOR: 1

jobs:
  # ============================================
  # 代码质量检查 (Code Quality Checks)
  # ============================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: ./.github/actions/setup
        with:
          python-version: '3.11'

      - name: Install linting dependencies
        run: |
          pip install -U pip setuptools wheel
          pip install flake8 mypy types-Markdown black isort

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('**/setup.py', '**/setup.cfg') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-

      - name: Run flake8 (代码风格检查)
        run: flake8 pdoc setup.py --count --statistics --show-source

      - name: Run mypy (类型检查)
        run: mypy -p pdoc --ignore-missing-imports

      - name: Run black (代码格式化检查)
        run: black --check --diff pdoc setup.py

      - name: Run isort (导入排序检查)
        run: isort --check-only --diff pdoc setup.py

      - name: Lint Markdown files
        run: find . -name '*.md' -not -path './.github/*' | xargs .github/lint-markdown.sh

  # ============================================
  # 多版本测试矩阵 (Test Matrix)
  # ============================================
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: lint
    if: github.event.inputs.skip_tests != 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']
        include:
          # 包含代码覆盖率测试
          - os: ubuntu-latest
            python-version: '3.11'
            coverage: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~\AppData\Local\pip\Cache
            ~/Library/Caches/pip
          key: ${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('**/setup.py') }}
          restore-keys: |
            ${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          pip install -U pip setuptools wheel
          pip install -e .

      - name: Run tests with coverage
        if: matrix.coverage
        run: |
          pip install coverage
          coverage run -m unittest discover -v pdoc.test
          coverage report
          coverage xml

      - name: Run tests without coverage
        if: '!matrix.coverage'
        run: python -m unittest discover -v pdoc.test

      - name: Upload coverage to Codecov
        if: matrix.coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # ============================================
  # PDF 文档测试 (PDF Generation Test)
  # ============================================
  test-pdf:
    name: Test PDF Generation
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: ./.github/actions/setup
        with:
          python-version: '3.11'

      - name: Cache pandoc
        uses: actions/cache@v4
        with:
          path: /tmp/pandoc.deb
          key: pandoc-3.1.12.2

      - name: Install dependencies
        run: |
          pip install -U pip setuptools wheel
          pip install -e .

      - name: Install LaTeX and pandoc
        run: |
          sudo apt-get remove man-db -y  # 加速CI
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex lmodern texlive-fonts-recommended
          wget --no-clobber -O /tmp/pandoc.deb \
            https://github.com/jgm/pandoc/releases/download/3.1.12.2/pandoc-3.1.12.2-1-amd64.deb || true
          sudo dpkg -i /tmp/pandoc.deb

      - name: Test PDF generation
        env:
          PDOC_TEST_PANDOC: 1
        run: python -m unittest -v pdoc.test.CliTest.test_pdf_pandoc

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pdoc-Documentation-PDF
          path: /tmp/pdoc.pdf
          retention-days: 30

  # ============================================
  # 构建文档 (Build Documentation)
  # ============================================
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --depth=1 origin +refs/tags/*:refs/tags/*

      - name: Setup Python
        uses: ./.github/actions/setup
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-docs-${{ hashFiles('**/setup.py') }}

      - name: Install dependencies
        run: |
          pip install -U pip setuptools wheel
          pip install -e .

      - name: Build documentation
        run: time doc/build.sh

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: doc/build/
          retention-days: 7

      - name: Check for broken links
        run: |
          pip install linkchecker || true
          linkchecker doc/build/index.html --check-extern || true

  # ============================================
  # 安全扫描 (Security Scanning)
  # ============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: ./.github/actions/setup
        with:
          python-version: '3.11'

      - name: Install security tools
        run: |
          pip install -U pip setuptools wheel
          pip install bandit safety

      - name: Run bandit (安全漏洞扫描)
        run: bandit -r pdoc -f json -o bandit-report.json || true

      - name: Run safety (依赖安全检查)
        run: safety check --json --output safety-report.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
          retention-days: 30

  # ============================================
  # 通知 (Notifications)
  # ============================================
  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [lint, test, build-docs]
    if: always() && github.event_name == 'push'
    steps:
      - name: Check job status
        run: |
          if [ "${{ needs.lint.result }}" == "failure" ] || \
             [ "${{ needs.test.result }}" == "failure" ] || \
             [ "${{ needs.build-docs.result }}" == "failure" ]; then
            echo "::error::CI pipeline failed!"
            exit 1
          fi
          echo "CI pipeline completed successfully!"
