name: Deploy

on:
  push:
    branches: [master, main]
    tags: ['[0-9]+.[0-9]+.*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Version to deploy (for production, e.g., 1.0.0) or rollback-{SHA}'
        required: false
        default: ''
        type: string
      skip_tests:
        description: 'Skip tests before deployment'
        required: false
        default: false
        type: boolean
      action:
        description: 'Action to perform'
        required: false
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback

env:
  PYTHONUNBUFFERED: '1'
  PIP_DISABLE_PIP_VERSION_CHECK: '1'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  determine-environment:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      is_release: ${{ steps.set-env.outputs.is_release }}
      version: ${{ steps.set-env.outputs.version }}
      is_rollback: ${{ steps.set-env.outputs.is_rollback }}
      rollback_target: ${{ steps.set-env.outputs.rollback_target }}
    steps:
      - name: Set environment
        id: set-env
        run: |
          ENV=""
          VERSION=""
          IS_ROLLBACK="false"
          ROLLBACK_TARGET=""
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ github.event.inputs.environment }}"
            VERSION="${{ github.event.inputs.version }}"
            
            if [[ "${{ github.event.inputs.action }}" == "rollback" ]] || \
               [[ "$VERSION" == rollback-* ]]; then
              IS_ROLLBACK="true"
              ROLLBACK_TARGET="${VERSION#rollback-}"
              VERSION="rollback-$ROLLBACK_TARGET"
            fi
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            ENV="production"
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            ENV="staging"
            VERSION="${GITHUB_SHA:0:7}"
          fi
          
          IS_RELEASE="false"
          if [[ "$ENV" == "production" && "$IS_ROLLBACK" == "false" ]]; then
            IS_RELEASE="true"
          fi
          
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "is_release=$IS_RELEASE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_rollback=$IS_ROLLBACK" >> $GITHUB_OUTPUT
          echo "rollback_target=$ROLLBACK_TARGET" >> $GITHUB_OUTPUT
          
          if [[ "$IS_ROLLBACK" == "true" ]]; then
            echo "::warning::Rollback requested to commit: $ROLLBACK_TARGET"
          else
            echo "::notice::Deploying to $ENV environment (version: $VERSION)"
          fi

  run-tests:
    name: Run Tests Before Deploy
    runs-on: ubuntu-latest
    needs: determine-environment
    if: ${{ !inputs.skip_tests && needs.determine-environment.outputs.is_rollback != 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install -U pip setuptools wheel
          pip install -e .

      - name: Run tests
        run: python -m unittest -v pdoc.test

  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    needs: [determine-environment, run-tests]
    if: always() && (needs.run-tests.result == 'success' || needs.run-tests.result == 'skipped')
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout rollback target
        if: needs.determine-environment.outputs.is_rollback == 'true'
        run: git checkout ${{ needs.determine-environment.outputs.rollback_target }}

      - name: Fetch all tags
        run: git fetch --depth=1 origin +refs/tags/*:refs/tags/*

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install -U pip setuptools wheel
          pip install -e .

      - name: Build documentation
        run: |
          if [[ "${{ needs.determine-environment.outputs.is_release }}" == "true" ]]; then
            time doc/build.sh
          else
            pdoc3 --html --output-dir doc/build pdoc
          fi

      - name: Add version info
        run: |
          VERSION="${{ needs.determine-environment.outputs.version }}"
          ENV="${{ needs.determine-environment.outputs.environment }}"
          IS_ROLLBACK="${{ needs.determine-environment.outputs.is_rollback }}"
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          cat > doc/build/build-info.json << EOF
          {
            "version": "$VERSION",
            "environment": "$ENV",
            "build_time": "$BUILD_TIME",
            "commit": "${GITHUB_SHA}",
            "ref": "${GITHUB_REF}",
            "is_rollback": $IS_ROLLBACK
          }
          EOF

      - name: Upload documentation artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: docs-${{ needs.determine-environment.outputs.environment }}-${{ needs.determine-environment.outputs.version }}
          path: doc/build/
          retention-days: 30

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [determine-environment, build-docs]
    if: needs.determine-environment.outputs.environment == 'staging'
    environment:
      name: staging
      url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/staging/
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-${{ needs.determine-environment.outputs.environment }}-${{ needs.determine-environment.outputs.version }}
          path: doc/build/

      - name: Deploy to GitHub Pages (Staging)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: doc/build
          destination_dir: staging
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy staging: ${{ needs.determine-environment.outputs.version }}'

      - name: Comment deployment URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📚 Documentation Deployed\n\n**Staging URL**: https://${context.repo.owner}.github.io/${context.repo.repo}/staging/\n\n**Version**: ${{ needs.determine-environment.outputs.version }}`
            })

      - name: Send deployment notification
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          chmod +x .github/notify.sh
          STATUS="success"
          if [[ "${{ job.status }}" != "success" ]]; then
            STATUS="failure"
          fi
          .github/notify.sh \
            -t deploy \
            -s $STATUS \
            -e staging \
            -v "${{ needs.determine-environment.outputs.version }}"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [determine-environment, build-docs]
    if: needs.determine-environment.outputs.environment == 'production'
    environment:
      name: production
      url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-${{ needs.determine-environment.outputs.environment }}-${{ needs.determine-environment.outputs.version }}
          path: doc/build/

      - name: Create deployment record
        run: |
          VERSION="${{ needs.determine-environment.outputs.version }}"
          DEPLOY_DIR="deployments/$VERSION"
          mkdir -p "$DEPLOY_DIR"
          cp -r doc/build/* "$DEPLOY_DIR/"
          
          cat > "$DEPLOY_DIR/deployment.json" << EOF
          {
            "version": "$VERSION",
            "deployed_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "commit": "${GITHUB_SHA}",
            "deployed_by": "${GITHUB_ACTOR}",
            "is_rollback": ${{ needs.determine-environment.outputs.is_rollback }}
          }
          EOF

      - name: Deploy to GitHub Pages (Production)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: doc/build
          publish_branch: gh-pages
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy production: ${{ needs.determine-environment.outputs.version }}'

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            doc/build/**/*.html
          body: |
            ## Release ${{ needs.determine-environment.outputs.version }}
            
            📚 **Documentation**: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
            
            ### Changes
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/master/CHANGELOG) for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create deployment tag for rollback
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          
          if [[ "${{ needs.determine-environment.outputs.is_rollback }}" == "true" ]]; then
            git tag -f "deployed-production" "${{ needs.determine-environment.outputs.rollback_target }}"
          else
            git tag -f "deployed-production" "${GITHUB_SHA}"
          fi
          git push origin "deployed-production" --force || true

      - name: Send deployment notification
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          chmod +x .github/notify.sh
          STATUS="success"
          TYPE="deploy"
          
          if [[ "${{ job.status }}" != "success" ]]; then
            STATUS="failure"
          fi
          
          if [[ "${{ needs.determine-environment.outputs.is_rollback }}" == "true" ]]; then
            TYPE="rollback"
          fi
          
          .github/notify.sh \
            -t $TYPE \
            -s $STATUS \
            -e production \
            -v "${{ needs.determine-environment.outputs.version }}"

  list-deployments:
    name: List Available Deployments
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'rollback'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --depth=1 origin +refs/tags/*:refs/tags/*

      - name: List recent deployments
        run: |
          echo "## Recent Deployments" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Tags (Production Releases)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          git tag -l '[0-9]*' | sort -Vr | head -10 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Recent Commits" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          git log --oneline -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### How to Rollback" >> $GITHUB_STEP_SUMMARY
          echo "To rollback, trigger this workflow with:" >> $GITHUB_STEP_SUMMARY
          echo "- action: \`rollback\`" >> $GITHUB_STEP_SUMMARY
          echo "- version: \`rollback-{commit-sha}\` or \`rollback-{tag}\`" >> $GITHUB_STEP_SUMMARY

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [determine-environment, deploy-staging, deploy-production]
    if: failure()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send failure notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          chmod +x .github/notify.sh
          .github/notify.sh \
            -t deploy \
            -s failure \
            -e "${{ needs.determine-environment.outputs.environment }}" \
            -v "${{ needs.determine-environment.outputs.version }}" \
            -m "Deployment failed. Check the workflow logs for details."
